<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/main.js" defer></script>
    <title>BrowserColorTestingTool</title>
</head>

<body id="body">
    <header id="header" class="header">
        <div class="header-content">
            <div>
                BrowserColorTestingTool
            </div>
            <!-- <div>
                <label for="platforms">platform:</label>
                <select name="platforms" id="platforms">
                    <option value="ios" selected>safari</option>
                    <option value="android">chrome</option>
                    <option value="all">all options</option>
                </select>
            </div> -->
        </div>
    </header>

    <div id="main" class="main">
        <div style="height: 200px; background-color: lightgray;">
            Some text to push the sticky bit down a little.
        </div>

        <div id="content" class="content">
            <div id="sticky" class="sticky">
                Scroll and takeover the top with sticky.
            </div>

            <div class="column-container controls">
                <div class="category">
                    theme-color
                    <div class="row-container">
                        <label for="checkbox-theme-color">active:</label>
                        <input type="checkbox" id="checkbox-theme-color" value="">
                        <label for="colorselector-theme-color">color:</label>
                        <input type="color" id="colorselector-theme-color" value="#ff0000">
                    </div>
                </div>
                <div class="category">
                    body
                    <div class="row-container">
                        <div class="row-container">
                            <label for="checkbox-body-background">background:</label>
                            <input type="checkbox" id="checkbox-body-background" name="body"
                                value="color-body-background">
                            <input type="color" id="color-body-background" value="#ff0000" disabled>
                        </div>
                    </div>
                </div>

                <div class="category">
                    header
                    <div class="row-container">
                        <label for="select-header-position">position:</label>
                        <select id="select-header-position">
                            <option value="static" selected>static</option>
                            <option value="fixed">fixed</option>
                        </select>
                    </div>

                    <div class="row-container">
                        <label for="number-header-top">top:</label>
                        <input type="number" id="number-header-top" value="0" disabled>
                    </div>

                    <div class="row-container">
                        <label for="checkbox-header-background">background:</label>
                        <input type="checkbox" id="checkbox-header-background" name="header"
                            value="color-header-background">
                        <input type="color" id="color-header-background" value="#ff0000" disabled>
                    </div>
                </div>

                <div class="category">
                    footer
                    <div class="row-container">
                        <label for="select-footer-position">position:</label>
                        <select id="select-footer-position">
                            <option value="static" selected>static</option>
                            <option value="fixed">fixed</option>
                        </select>
                    </div>

                    <div class="row-container">
                        <label for="number-footer-bottom">top:</label>
                        <input type="number" id="number-footer-bottom" value="0" disabled>
                    </div>

                    <div class="row-container">
                        <label for="checkbox-footer-background">background:</label>
                        <input type="checkbox" id="checkbox-footer-background" name="footer"
                            value="color-footer-background">
                        <input type="color" id="color-footer-background" value="#ff0000" disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div id="overflowMain" style="display:none">
        <br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br>
        So cold.
    </div>
    </div>

    <div id="overflowBody" style="display:none">
        <br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br>
        So cold.
    </div>

    <footer id="footer" class="footer">
        Footer AreaFooter AreaFooter AreaFooter AreaFooter AreaFooter AreaFooter Area
    </footer>
</body>

</html>
